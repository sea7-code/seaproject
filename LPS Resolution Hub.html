  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

Asisten<\u002Fa>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- BREADCRUMB -->\n  <div style=\"border-bottom:1px solid var(--line);background:#fff\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:11px 24px;font-size:13px;color:var(--muted);display:flex;flex-wrap:wrap;gap:8px;align-items:center\">\n      <span>Beranda<\u002Fspan><span style=\"opacity:.5\">/<\u002Fspan><span>Resolusi Bank<\u002Fspan><span style=\"opacity:.5\">/<\u002Fspan><span>Daftar Bank Ditangani<\u002Fspan><span style=\"opacity:.5\">/<\u002Fspan><span style=\"color:var(--ink);font-weight:600\">{{ bank.name }}<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- HERO -->\n  <section style=\"background:linear-gradient(180deg,#fff 0%,#FDF7EF 100%);border-bottom:1px solid var(--line)\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:36px 24px 40px;display:flex;flex-wrap:wrap;gap:36px;align-items:flex-start\">\n      <div style=\"flex:1 1 460px;min-width:300px\">\n        <div style=\"display:inline-flex;align-items:center;gap:9px;background:var(--accent);color:#fff;font-weight:700;font-size:12.5px;letter-spacing:.3px;padding:7px 14px;border-radius:999px;text-transform:uppercase\">\n          <span style=\"width:8px;height:8px;border-radius:50%;background:#fff;display:inline-block;animation:lpsPulse 2s infinite\"><\u002Fspan>{{ bank.statusBadge }}\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:flex-start;gap:18px;margin-top:18px\">\n          <div style=\"width:64px;height:64px;border-radius:16px;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:24px;flex:none\">BC<\u002Fdiv>\n          <div>\n            <h1 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:38px;line-height:1.05;margin:0 0 6px;letter-spacing:-.5px\">{{ bank.name }}<\u002Fh1>\n            <div style=\"display:flex;flex-wrap:wrap;gap:8px 16px;font-size:14px;color:var(--muted);font-weight:500\">\n              <span>📍 {{ bank.location }}<\u002Fspan><span>·<\u002Fspan><span>Sandi Bank {{ bank.code }}<\u002Fspan><span>·<\u002Fspan><span>Jenis: {{ bank.type }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:15.5px;line-height:1.65;color:rgba(22,42,60,.78);max-width:560px;margin:20px 0 0\">Halaman ini mengintegrasikan seluruh informasi resmi penanganan {{ bank.short }} oleh LPS — mulai dari status pembayaran simpanan, kronologi, pengumuman, dokumen, hingga lokasi bank pembayar. Diperbarui {{ bank.updated }}.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:12px;margin-top:24px\">\n          <a href=\"#cek\" style=\"text-decoration:none;background:var(--accent);color:#fff;font-weight:700;font-size:14.5px;padding:13px 22px;border-radius:11px;display:inline-flex;align-items:center;gap:9px\">Cek Status Simpanan Saya →<\u002Fa>\n          <a href=\"#tracker\" style=\"text-decoration:none;background:#fff;color:var(--ink);border:1px solid var(--line);font-weight:700;font-size:14.5px;padding:13px 22px;border-radius:11px\">Lihat Tahap Pembayaran<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- QUICK ACTION CARD -->\n      <aside style=\"flex:0 1 340px;min-width:280px;background:#fff;border:1px solid var(--line);border-radius:18px;padding:22px;box-shadow:0 10px 30px -18px rgba(22,42,60,.4)\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--muted)\">Ringkasan Resolusi<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:2px;margin-top:14px\">\n          <sc-for list=\"{{ summary }}\" as=\"row\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)\">\n              <span style=\"font-size:13.5px;color:var(--muted);font-weight:500\">{{ row.label }}<\u002Fspan>\n              <span style=\"font-size:14px;font-weight:700;text-align:right;color:{{ row.color }}\">{{ row.value }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <a href=\"#kontak\" style=\"text-decoration:none;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:16px;background:var(--ink);color:#fff;font-weight:700;font-size:14px;padding:12px;border-radius:11px\">Hubungi Bank Pembayar<\u002Fa>\n        <div style=\"text-align:center;font-size:12px;color:var(--muted);margin-top:10px\">Bebas pulsa · Call Center LPS 154<\u002Fdiv>\n      <\u002Faside>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- KEY FACTS -->\n  <section style=\"max-width:1180px;margin:0 auto;padding:34px 24px 8px\">\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px\">\n      <sc-for list=\"{{ stats }}\" as=\"s\" hint-placeholder-count=\"5\">\n        <div style=\"background:#fff;border:1px solid var(--line);border-radius:14px;padding:18px 18px 16px\">\n          <div style=\"font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.2px;min-height:32px\">{{ s.label }}<\u002Fdiv>\n          <div style=\"font-family:'Newsreader',serif;font-size:26px;font-weight:600;letter-spacing:-.3px;margin-top:8px;font-variant-numeric:tabular-nums\">{{ s.value }}<\u002Fdiv>\n          <div style=\"font-size:12.5px;color:var(--muted);margin-top:4px\">{{ s.sub }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PAYMENT TRACKER -->\n  <section id=\"tracker\" style=\"max-width:1180px;margin:0 auto;padding:40px 24px\">\n    <div style=\"display:flex;flex-wrap:wrap;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:6px\">\n      <h2 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:27px;margin:0;letter-spacing:-.3px\">Status &amp; Tahapan Pembayaran<\u002Fh2>\n      <span style=\"font-size:13px;color:var(--muted);font-weight:600\">Posisi saat ini: <span style=\"color:var(--accent)\">{{ currentStageLabel }}<\u002Fspan><\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"font-size:14.5px;color:var(--muted);margin:0 0 26px;max-width:680px\">Pembayaran simpanan dilakukan bertahap setelah proses verifikasi dan rekonsiliasi data selesai. Berikut posisi penanganan {{ bank.short }}.<\u002Fp>\n    <div style=\"background:#fff;border:1px solid var(--line);border-radius:18px;padding:30px 26px;display:grid;grid-template-columns:repeat(auto-fit,minmax(196px,1fr));gap:26px 12px\">\n      <sc-for list=\"{{ steps }}\" as=\"st\" hint-placeholder-count=\"5\">\n        <div style=\"min-width:0\">\n          <div style=\"display:flex;align-items:center;gap:0\">\n            <div style=\"width:40px;height:40px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;background:{{ st.badgeBg }};color:{{ st.badgeFg }};border:1.5px solid {{ st.badgeBorder }};{{ st.badgeAnim }}\">{{ st.badge }}<\u002Fdiv>\n            <div style=\"height:2px;flex:1;background:{{ st.lineColor }}\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"margin-top:14px\">\n            <div style=\"font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:{{ st.tagColor }}\">{{ st.tag }}<\u002Fdiv>\n            <div style=\"font-size:14.5px;font-weight:700;line-height:1.3;margin-top:4px;color:{{ st.titleColor }}\">{{ st.title }}<\u002Fdiv>\n            <div style=\"font-size:12.5px;color:var(--muted);margin-top:4px\">{{ st.date }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CEK STATUS -->\n  <section id=\"cek\" style=\"background:var(--cream)\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:42px 24px\">\n      <div style=\"display:flex;flex-wrap:wrap;gap:36px;align-items:flex-start\">\n        <div style=\"flex:1 1 360px;min-width:280px\">\n          <div style=\"font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--accent)\">Layanan Mandiri<\u002Fdiv>\n          <h2 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:27px;margin:8px 0 12px;letter-spacing:-.3px\">Cek Status Simpanan Saya<\u002Fh2>\n          <p style=\"font-size:14.5px;line-height:1.6;color:rgba(22,42,60,.78);margin:0 0 18px\">Masukkan nomor rekening atau NIK Anda untuk mengetahui status verifikasi simpanan, kategori layak/tidak layak bayar, dan instruksi pencairan. Data Anda bersifat rahasia dan tidak disimpan.<\u002Fp>\n          <div style=\"background:#fff;border:1px solid var(--line);border-radius:16px;padding:20px\">\n            <label style=\"font-size:13px;font-weight:600;color:var(--ink)\">Nomor Rekening / NIK<\u002Flabel>\n            <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-top:8px\">\n              <input value=\"{{ checkVal }}\" oninput=\"{{ onCheckInput }}\" placeholder=\"cth. 0098 7654 3210\" style=\"flex:1;min-width:180px;font-family:'IBM Plex Mono',monospace;font-size:15px;padding:13px 14px;border:1px solid var(--line);border-radius:11px;outline:none;color:var(--ink)\" style-focus=\"border-color:var(--accent)\">\n              <button onclick=\"{{ doCheck }}\" style=\"background:var(--accent);color:#fff;font-weight:700;font-size:14.5px;font-family:inherit;border:none;padding:13px 22px;border-radius:11px;cursor:pointer\">Cek Status<\u002Fbutton>\n            <\u002Fdiv>\n            <div style=\"font-size:12px;color:var(--muted);margin-top:10px\">🔒 Terenkripsi · Hasil bersifat indikatif, verifikasi akhir oleh bank pembayar.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:1 1 340px;min-width:280px\">\n          <sc-if value=\"{{ checkResult }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;animation:lpsRise .4s ease\">\n              <div style=\"background:var(--ink);color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:between;gap:12px\">\n                <div>\n                  <div style=\"font-size:12px;color:rgba(255,255,255,.7);font-weight:500\">Rekening {{ checkResult.acct }}<\u002Fdiv>\n                  <div style=\"font-size:17px;font-weight:700;margin-top:2px\">{{ checkResult.name }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"padding:20px\">\n                <div style=\"display:inline-flex;align-items:center;gap:8px;background:rgba(47,138,91,.12);color:#216B45;font-weight:700;font-size:13px;padding:7px 13px;border-radius:999px\">● {{ checkResult.statusLabel }}<\u002Fdiv>\n                <div style=\"display:flex;flex-direction:column;gap:0;margin-top:16px\">\n                  <sc-for list=\"{{ checkResult.rows }}\" as=\"r\" hint-placeholder-count=\"3\">\n                    <div style=\"display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)\">\n                      <span style=\"font-size:13px;color:var(--muted)\">{{ r.k }}<\u002Fspan>\n                      <span style=\"font-size:13.5px;font-weight:700;text-align:right;font-variant-numeric:tabular-nums\">{{ r.v }}<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <div style=\"background:var(--soft);border-radius:11px;padding:13px 14px;font-size:13px;line-height:1.55;color:rgba(22,42,60,.8);margin-top:16px\">{{ checkResult.note }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noResult }}\" hint-placeholder-val=\"{{ true }}\">\n            <div style=\"border:1.5px dashed var(--line);border-radius:16px;padding:30px;text-align:center;color:var(--muted)\">\n              <div style=\"font-size:30px\">🔎<\u002Fdiv>\n              <div style=\"font-size:14px;font-weight:600;margin-top:8px;color:var(--ink)\">Belum ada hasil<\u002Fdiv>\n              <div style=\"font-size:13px;margin-top:4px\">Masukkan nomor rekening atau NIK lalu klik <b>Cek Status<\u002Fb>.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- TIMELINE + NEWS -->\n  <section style=\"max-width:1180px;margin:0 auto;padding:46px 24px\">\n    <div style=\"display:flex;flex-wrap:wrap;gap:40px;align-items:flex-start\">\n      <!-- timeline -->\n      <div style=\"flex:1 1 380px;min-width:300px\">\n        <h2 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:25px;margin:0 0 4px;letter-spacing:-.3px\">Kronologi Penanganan<\u002Fh2>\n        <p style=\"font-size:14px;color:var(--muted);margin:0 0 24px\">Rangkaian peristiwa resmi sejak pencabutan izin usaha.<\u002Fp>\n        <div style=\"position:relative;padding-left:8px\">\n          <sc-for list=\"{{ timeline }}\" as=\"t\" hint-placeholder-count=\"5\">\n            <div style=\"position:relative;padding-left:30px;padding-bottom:24px;border-left:2px solid {{ t.lineColor }};margin-left:6px\">\n              <div style=\"position:absolute;left:-8px;top:1px;width:15px;height:15px;border-radius:50%;background:{{ t.dotBg }};border:2.5px solid {{ t.dotBorder }}\"><\u002Fdiv>\n              <div style=\"font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.2px;font-variant-numeric:tabular-nums\">{{ t.date }}<\u002Fdiv>\n              <div style=\"font-size:15px;font-weight:700;margin-top:3px;line-height:1.3\">{{ t.title }}<\u002Fdiv>\n              <div style=\"font-size:13.5px;color:rgba(22,42,60,.72);margin-top:4px;line-height:1.55\">{{ t.body }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- news -->\n      <div style=\"flex:1 1 380px;min-width:300px\">\n        <div style=\"display:flex;flex-wrap:wrap;align-items:baseline;justify-content:space-between;gap:10px\">\n          <h2 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:25px;margin:0;letter-spacing:-.3px\">Pengumuman &amp; Berita<\u002Fh2>\n          <span style=\"font-size:13px;color:var(--accent);font-weight:700\">Lihat semua →<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"font-size:14px;color:var(--muted);margin:4px 0 18px\">Seluruh rilis resmi terkait {{ bank.short }} dalam satu aliran.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px\">\n          <sc-for list=\"{{ newsFilters }}\" as=\"f\" hint-placeholder-count=\"4\">\n            <button onclick=\"{{ f.onClick }}\" style=\"font-family:inherit;font-size:13px;font-weight:600;padding:7px 14px;border-radius:999px;cursor:pointer;border:1px solid {{ f.border }};background:{{ f.bg }};color:{{ f.fg }}\">{{ f.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <sc-for list=\"{{ filteredNews }}\" as=\"n\" hint-placeholder-count=\"4\">\n            <a href=\"#\" style=\"text-decoration:none;color:inherit;display:block;background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;transition:border-color .15s\" style-hover=\"border-color:var(--accent)\">\n              <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:8px\">\n                <span style=\"font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:#fff;background:{{ n.tagColor }};padding:4px 9px;border-radius:6px\">{{ n.type }}<\u002Fspan>\n                <span style=\"font-size:12.5px;color:var(--muted);font-variant-numeric:tabular-nums\">{{ n.date }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:15.5px;font-weight:700;line-height:1.35;letter-spacing:-.2px\">{{ n.title }}<\u002Fdiv>\n              <div style=\"font-size:13.5px;color:rgba(22,42,60,.7);margin-top:6px;line-height:1.5\">{{ n.excerpt }}<\u002Fdiv>\n            <\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- DOCS + KONTAK -->\n  <section style=\"background:var(--soft);border-top:1px solid var(--line);border-bottom:1px solid var(--line)\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:46px 24px;display:flex;flex-wrap:wrap;gap:40px;align-items:flex-start\">\n      <!-- docs -->\n      <div style=\"flex:1 1 380px;min-width:300px\">\n        <h2 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:25px;margin:0 0 4px;letter-spacing:-.3px\">Dokumen &amp; Unduhan<\u002Fh2>\n        <p style=\"font-size:14px;color:var(--muted);margin:0 0 20px\">Formulir, surat keputusan, dan panduan resmi.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:10px\">\n          <sc-for list=\"{{ docs }}\" as=\"d\" hint-placeholder-count=\"5\">\n            <a href=\"#\" style=\"text-decoration:none;color:inherit;display:flex;align-items:center;gap:14px;background:#fff;border:1px solid var(--line);border-radius:13px;padding:14px 16px\" style-hover=\"border-color:var(--accent)\">\n              <div style=\"width:40px;height:40px;border-radius:9px;background:rgba(240,139,29,.12);color:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex:none\">{{ d.ext }}<\u002Fdiv>\n              <div style=\"flex:1;min-width:0\">\n                <div style=\"font-size:14.5px;font-weight:700;line-height:1.3\">{{ d.title }}<\u002Fdiv>\n                <div style=\"font-size:12.5px;color:var(--muted);margin-top:2px\">{{ d.meta }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"color:var(--accent);font-weight:700;font-size:18px;flex:none\">↓<\u002Fdiv>\n            <\u002Fa>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- kontak / lokasi -->\n      <div id=\"kontak\" style=\"flex:1 1 380px;min-width:300px\">\n        <h2 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:25px;margin:0 0 4px;letter-spacing:-.3px\">Lokasi &amp; Kontak Bank Pembayar<\u002Fh2>\n        <p style=\"font-size:14px;color:var(--muted);margin:0 0 20px\">Pencairan simpanan dilakukan melalui <b style=\"color:var(--ink)\">{{ bank.payer }}<\u002Fb>.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:12px\">\n          <sc-for list=\"{{ branches }}\" as=\"b\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fff;border:1px solid var(--line);border-radius:13px;padding:16px 18px\">\n              <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px\">\n                <div style=\"font-size:15px;font-weight:700\">{{ b.name }}<\u002Fdiv>\n                <span style=\"font-size:11.5px;font-weight:700;color:#216B45;background:rgba(47,138,91,.12);padding:4px 10px;border-radius:999px\">{{ b.status }}<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"font-size:13.5px;color:rgba(22,42,60,.72);margin-top:6px;line-height:1.5\">{{ b.address }}<\u002Fdiv>\n              <div style=\"display:flex;flex-wrap:wrap;gap:6px 18px;margin-top:10px;font-size:13px;color:var(--muted)\">\n                <span>🕘 {{ b.hours }}<\u002Fspan><span>☎ {{ b.phone }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FAQ -->\n  <section style=\"max-width:900px;margin:0 auto;padding:50px 24px\">\n    <div style=\"text-align:center;margin-bottom:30px\">\n      <div style=\"font-size:12px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--accent)\">Pertanyaan Umum<\u002Fdiv>\n      <h2 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:30px;margin:8px 0 0;letter-spacing:-.4px\">Yang Sering Ditanyakan Nasabah<\u002Fh2>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:10px\">\n      <sc-for list=\"{{ faqs }}\" as=\"q\" hint-placeholder-count=\"6\">\n        <div style=\"background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden\">\n          <button onclick=\"{{ q.toggle }}\" style=\"width:100%;text-align:left;background:none;border:none;cursor:pointer;font-family:inherit;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px\">\n            <span style=\"font-size:15.5px;font-weight:700;color:var(--ink);line-height:1.35\">{{ q.q }}<\u002Fspan>\n            <span style=\"font-size:20px;color:var(--accent);flex:none;transition:transform .2s;transform:rotate({{ q.rot }})\">+<\u002Fspan>\n          <\u002Fbutton>\n          <sc-if value=\"{{ q.open }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"padding:0 20px 20px;font-size:14.5px;line-height:1.65;color:rgba(22,42,60,.78)\">{{ q.a }}<\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- AI CHAT EXPLAINER -->\n  <section id=\"chat-section\" style=\"background:var(--ink);color:#fff\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:54px 24px;display:flex;flex-wrap:wrap;gap:42px;align-items:center\">\n      <div style=\"flex:1 1 420px;min-width:300px\">\n        <div style=\"display:inline-flex;align-items:center;gap:9px;background:rgba(240,139,29,.16);color:var(--accent);font-weight:700;font-size:12.5px;letter-spacing:.4px;padding:7px 14px;border-radius:999px;text-transform:uppercase\">✦ Didukung Kecerdasan Buatan<\u002Fdiv>\n        <h2 style=\"font-family:'Newsreader',serif;font-weight:600;font-size:34px;line-height:1.1;margin:18px 0 14px;letter-spacing:-.5px\">Tanya apa saja soal simpanan Anda — dijawab seketika.<\u002Fh2>\n        <p style=\"font-size:16px;line-height:1.65;color:rgba(255,255,255,.78);margin:0 0 26px;max-width:540px\">Asisten virtual LPS membantu nasabah {{ bank.short }} 24/7: cek status pembayaran, syarat dan dokumen, lokasi bank pembayar, hingga estimasi pencairan — tanpa antre. Jawaban berbasis informasi resmi LPS.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px\">\n          <sc-for list=\"{{ aiFeatures }}\" as=\"a\" hint-placeholder-count=\"4\">\n            <div style=\"background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:13px;padding:16px\">\n              <div style=\"font-size:20px\">{{ a.icon }}<\u002Fdiv>\n              <div style=\"font-size:14.5px;font-weight:700;margin-top:8px\">{{ a.title }}<\u002Fdiv>\n              <div style=\"font-size:13px;color:rgba(255,255,255,.66);margin-top:4px;line-height:1.5\">{{ a.body }}<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <button onclick=\"{{ openChat }}\" style=\"margin-top:28px;font-family:inherit;background:var(--accent);color:#fff;font-weight:700;font-size:15px;border:none;padding:14px 26px;border-radius:12px;cursor:pointer;display:inline-flex;align-items:center;gap:10px\">💬 Mulai Percakapan<\u002Fbutton>\n        <div style=\"font-size:12.5px;color:rgba(255,255,255,.5);margin-top:14px\">Untuk kasus kompleks, asisten akan menghubungkan Anda ke petugas LPS.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- preview mockup -->\n      <div style=\"flex:0 1 360px;min-width:280px\">\n        <div style=\"background:#fff;border-radius:20px;overflow:hidden;box-shadow:0 30px 60px -25px rgba(0,0,0,.6)\">\n          <div style=\"background:var(--soft);border-bottom:1px solid var(--line);padding:14px 18px;display:flex;align-items:center;gap:11px\">\n            <div style=\"width:34px;height:34px;border-radius:10px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px\">AI<\u002Fdiv>\n            <div><div style=\"font-size:13.5px;font-weight:700;color:var(--ink)\">Asisten LPS<\u002Fdiv><div style=\"font-size:11.5px;color:#216B45;font-weight:600\">● Online<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:18px;display:flex;flex-direction:column;gap:10px;background:#fff\">\n            <div style=\"align-self:flex-start;max-width:80%;background:var(--soft);color:var(--ink);font-size:13.5px;line-height:1.5;padding:11px 14px;border-radius:14px 14px 14px 4px\">Halo! Saya bisa bantu cek status pembayaran simpanan Anda. 😊<\u002Fdiv>\n            <div style=\"align-self:flex-end;max-width:80%;background:var(--accent);color:#fff;font-size:13.5px;line-height:1.5;padding:11px 14px;border-radius:14px 14px 4px 14px\">Simpanan saya kapan bisa dicairkan?<\u002Fdiv>\n            <div style=\"align-self:flex-start;max-width:85%;background:var(--soft);color:var(--ink);font-size:13.5px;line-height:1.5;padding:11px 14px;border-radius:14px 14px 14px 4px\">Pembayaran Tahap I {{ bank.short }} sudah dibuka sejak 16 Jun 2026 di {{ bank.payer }}. Mau saya cek status rekening Anda?<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#0F2030;color:rgba(255,255,255,.66)\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:40px 24px;display:flex;flex-wrap:wrap;gap:30px;justify-content:space-between\">\n      <div style=\"max-width:320px\">\n        <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:12px\">\n          <div style=\"width:38px;height:38px;border-radius:10px;background:#fff;color:var(--ink);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px\">LPS<\u002Fdiv>\n          <div style=\"color:#fff;font-weight:700;font-size:15px\">Lembaga Penjamin Simpanan<\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:13px;line-height:1.6;margin:0\">Menjamin simpanan nasabah &amp; menjaga stabilitas sistem perbankan. Resolution Hub adalah pusat informasi penanganan bank resmi.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:48px;flex-wrap:wrap\">\n        <div>\n          <div style=\"color:#fff;font-weight:700;font-size:13px;margin-bottom:12px\">Resolusi Bank<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px;font-size:13px\"><span>Daftar Bank Ditangani<\u002Fspan><span>Status Pembayaran<\u002Fspan><span>Bank Pembayar<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"color:#fff;font-weight:700;font-size:13px;margin-bottom:12px\">Bantuan<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:9px;font-size:13px\"><span>Call Center 154<\u002Fspan><span>Asisten Virtual<\u002Fspan><span>Kantor LPS<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"border-top:1px solid rgba(255,255,255,.1)\"><div style=\"max-width:1180px;margin:0 auto;padding:16px 24px;font-size:12px;display:flex;flex-wrap:wrap;gap:10px;justify-content:space-between\"><span>© 2026 Lembaga Penjamin Simpanan. Data pada halaman ini bersifat ilustratif.<\u002Fspan><span>Diperbarui {{ bank.updated }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- FLOATING CHAT WIDGET -->\n  <sc-if value=\"{{ showChat }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"position:fixed;right:22px;bottom:22px;z-index:90;display:flex;flex-direction:column;align-items:flex-end;gap:14px\">\n    <sc-if value=\"{{ chatOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"width:368px;max-width:calc(100vw - 32px);height:520px;max-height:calc(100vh - 110px);background:#fff;border:1px solid var(--line);border-radius:20px;box-shadow:0 30px 60px -20px rgba(22,42,60,.5);display:flex;flex-direction:column;overflow:hidden;animation:lpsRise .25s ease\">\n        <div style=\"background:var(--ink);color:#fff;padding:15px 18px;display:flex;align-items:center;gap:12px\">\n          <div style=\"width:38px;height:38px;border-radius:11px;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px\">AI<\u002Fdiv>\n          <div style=\"flex:1\"><div style=\"font-size:14.5px;font-weight:700\">Asisten LPS<\u002Fdiv><div style=\"font-size:11.5px;color:rgba(255,255,255,.7)\">Didukung AI · Balasan otomatis<\u002Fdiv><\u002Fdiv>\n          <button onclick=\"{{ closeChat }}\" style=\"background:rgba(255,255,255,.12);border:none;color:#fff;width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;font-family:inherit\">✕<\u002Fbutton>\n        <\u002Fdiv>\n        <div id=\"lps-chat-scroll\" style=\"flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;background:var(--soft)\">\n          <sc-for list=\"{{ messages }}\" as=\"m\" hint-placeholder-count=\"1\">\n            <div style=\"align-self:{{ m.align }};max-width:82%;background:{{ m.bg }};color:{{ m.fg }};font-size:13.5px;line-height:1.5;padding:11px 14px;border-radius:{{ m.radius }};box-shadow:0 1px 2px rgba(22,42,60,.06)\">{{ m.text }}<\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"padding:12px;border-top:1px solid var(--line);background:#fff\">\n          <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-bottom:10px\">\n            <sc-for list=\"{{ quickReplies }}\" as=\"qr\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ qr.onClick }}\" style=\"font-family:inherit;font-size:12px;font-weight:600;color:var(--ink);background:var(--soft);border:1px solid var(--line);padding:6px 11px;border-radius:999px;cursor:pointer\">{{ qr.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;gap:8px;align-items:center\">\n            <input value=\"{{ chatInput }}\" oninput=\"{{ onChatInput }}\" onkeydown=\"{{ onChatKey }}\" placeholder=\"Tulis pertanyaan Anda…\" style=\"flex:1;font-family:inherit;font-size:14px;padding:11px 13px;border:1px solid var(--line);border-radius:11px;outline:none;color:var(--ink)\" style-focus=\"border-color:var(--accent)\">\n            <button onclick=\"{{ sendChat }}\" style=\"background:var(--accent);color:#fff;border:none;width:42px;height:42px;border-radius:11px;cursor:pointer;font-size:17px;flex:none\">➤<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n    <button onclick=\"{{ toggleChat }}\" style=\"display:flex;align-items:center;gap:10px;background:var(--accent);color:#fff;border:none;font-family:inherit;font-weight:700;font-size:15px;padding:14px 20px;border-radius:999px;cursor:pointer;box-shadow:0 12px 30px -8px rgba(240,139,29,.7)\">\n      <span style=\"font-size:19px\">{{ chatFabIcon }}<\u002Fspan><span>{{ chatFabLabel }}<\u002Fspan>\n    <\u002Fbutton>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#F08B1D&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#F08B1D&quot;,&quot;#162A3C&quot;,&quot;#2F8A5B&quot;]},&quot;paymentStage&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Pembayaran Tahap I&quot;,&quot;options&quot;:[&quot;Verifikasi&quot;,&quot;Penetapan&quot;,&quot;Pembayaran Tahap I&quot;,&quot;Pembayaran Tahap II&quot;,&quot;Selesai&quot;],&quot;tsType&quot;:&quot;string&quot;},&quot;showChat&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    faqOpen: 0,\n    checkVal: '',\n    checkResult: null,\n    newsFilter: 'all',\n    chatOpen: false,\n    chatInput: '',\n    messages: [\n      { role: 'bot', text: 'Halo! 👋 Saya Asisten Virtual LPS. Saya bisa bantu soal status pembayaran simpanan, lokasi bank pembayar, dokumen, dan estimasi pencairan. Ada yang bisa dibantu?' }\n    ]\n  };\n\n  STAGE_INDEX = { 'Verifikasi': 1, 'Penetapan': 2, 'Pembayaran Tahap I': 3, 'Pembayaran Tahap II': 4, 'Selesai': 5 };\n\n  componentDidUpdate(prevProps, prevState) {\n    if (prevState.messages !== this.state.messages || prevState.chatOpen !== this.state.chatOpen) {\n      const el = document.getElementById('lps-chat-scroll');\n      if (el) el.scrollTop = el.scrollHeight;\n    }\n  }\n\n  onCheckInput = (e) => this.setState({ checkVal: e.target.value });\n  doCheck = () => {\n    const v = (this.state.checkVal || '').trim();\n    if (!v) { this.setState({ checkResult: null }); return; }\n    this.setState({\n      checkResult: {\n        acct: '••• ' + v.slice(-4).padStart(4, '•'),\n        name: 'AHMAD R. (Penyimpan)',\n        statusLabel: 'Simpanan Layak Bayar — Tahap I',\n        rows: [\n          { k: 'Saldo terverifikasi', v: 'Rp 86.400.000' },\n          { k: 'Dijamin LPS', v: 'Rp 86.400.000' },\n          { k: 'Tahap pembayaran', v: 'Tahap I' },\n          { k: 'Bank pembayar', v: 'Bank Nusantara Sejahtera' }\n        ],\n        note: 'Simpanan Anda dapat dicairkan mulai 16 Jun 2026 di kantor bank pembayar dengan membawa KTP & buku tabungan/bilyet. Tidak dikenakan biaya apa pun.'\n      }\n    });\n  };\n\n  setNewsFilter = (k) => this.setState({ newsFilter: k });\n  toggleFaq = (i) => this.setState((s) => ({ faqOpen: s.faqOpen === i ? -1 : i }));\n\n  toggleChat = () => this.setState((s) => ({ chatOpen: !s.chatOpen }));\n  openChat = () => this.setState({ chatOpen: true });\n  closeChat = () => this.setState({ chatOpen: false });\n  onChatInput = (e) => this.setState({ chatInput: e.target.value });\n  onChatKey = (e) => { if (e.key === 'Enter') this.sendChat(); };\n  quickSend = (text) => { this.pushUser(text); };\n  sendChat = () => {\n    const t = (this.state.chatInput || '').trim();\n    if (!t) return;\n    this.setState({ chatInput: '' });\n    this.pushUser(t);\n  };\n  pushUser = (t) => {\n    this.setState((s) => ({ messages: [...s.messages, { role: 'user', text: t }] }));\n    const reply = this.botReply(t);\n    setTimeout(() => {\n      this.setState((s) => ({ messages: [...s.messages, { role: 'bot', text: reply }] }));\n    }, 650);\n  };\n  botReply = (t) => {\n    const x = t.toLowerCase();\n    if (x.includes('cair') || x.includes('kapan') || x.includes('bayar'))\n      return 'Pembayaran Tahap I sudah dibuka sejak 16 Jun 2026 melalui Bank Nusantara Sejahtera. Bawa KTP & buku tabungan/bilyet ke kantor bank pembayar. Mau saya cek status rekening Anda? Ketik nomor rekeningnya ya.';\n    if (x.includes('lokasi') || x.includes('kantor') || x.includes('dimana') || x.includes('alamat'))\n      return 'Bank pembayar: Bank Nusantara Sejahtera — Kantor Pusat di Jl. Asia Afrika No. 112, Bandung (Sen–Jum 08.00–15.00). Tersedia juga KC Cimahi & KC Soreang. Lihat bagian \"Lokasi & Kontak Bank Pembayar\".';\n    if (x.includes('dokumen') || x.includes('syarat') || x.includes('bawa'))\n      return 'Untuk pencairan, bawa: (1) KTP asli, (2) buku tabungan/bilyet deposito, (3) bukti kepemilikan rekening. Formulir & panduan lengkap ada di bagian \"Dokumen & Unduhan\".';\n    if (x.includes('maksimal') || x.includes('jamin') || x.includes('2 miliar') || x.includes('limit'))\n      return 'LPS menjamin simpanan hingga Rp 2 miliar per nasabah per bank, dengan memenuhi syarat 3T (Tercatat, Tingkat bunga wajar, Tidak menyebabkan bank rugi).';\n    if (x.includes('tidak layak') || x.includes('keberatan'))\n      return 'Jika simpanan dinyatakan tidak layak bayar, Anda dapat mengajukan keberatan melalui formulir resmi (lihat Dokumen & Unduhan) disertai bukti pendukung. Tim LPS akan menindaklanjuti.';\n    return 'Terima kasih. Saya catat pertanyaan Anda. Untuk hal spesifik terkait rekening, silakan ketik nomor rekening Anda atau hubungi Call Center LPS 154 (bebas pulsa). Apakah ada hal lain yang bisa saya bantu?';\n  };\n\n  renderVals() {\n    const accent = this.props.accent || '#F08B1D';\n    const stageProp = this.props.paymentStage || 'Pembayaran Tahap I';\n    const currentIdx = this.STAGE_INDEX[stageProp] != null ? this.STAGE_INDEX[stageProp] : 3;\n    const showChat = this.props.showChat !== false;\n\n    const bank = {\n      name: 'PT BPR Bank Catalonia',\n      short: 'BPR Bank Catalonia',\n      location: 'Kota Bandung, Jawa Barat',\n      code: '600.412',\n      type: 'Bank Perekonomian Rakyat',\n      statusBadge: 'Dalam Proses Pembayaran',\n      updated: '20 Juni 2026, 09:40 WIB',\n      payer: 'Bank Nusantara Sejahtera'\n    };\n\n    const stageLabels = ['', 'Rekonsiliasi & Verifikasi', 'Penetapan Simpanan Layak Bayar', 'Pembayaran Tahap I', 'Pembayaran Tahap II'];\n    const currentStageLabel = stageProp;\n\n    const summary = [\n      { label: 'Status Penjaminan', value: 'Dijamin LPS', color: '#216B45' },\n      { label: 'Tahap Saat Ini', value: stageProp, color: accent },\n      { label: 'Simpanan Layak Bayar', value: 'Rp 412,6 M', color: '#162A3C' },\n      { label: 'Progres Verifikasi', value: '94%', color: '#162A3C' }\n    ];\n\n    const stats = [\n      { label: 'Status Penjaminan Simpanan', value: 'Dijamin', sub: 'Sesuai UU No. 4/2023 (P2SK)' },\n      { label: 'Tgl. Pencabutan Izin Usaha (CIU)', value: '12 Mei 2026', sub: 'Ditetapkan OJK' },\n      { label: 'Jumlah Rekening Penyimpan', value: '8.742', sub: 'Total nasabah terdampak' },\n      { label: 'Simpanan Layak Bayar', value: 'Rp 412,6 M', sub: '94% dari total simpanan' },\n      { label: 'Bank Pembayar', value: 'Nusantara Sejahtera', sub: 'Mitra pencairan LPS' }\n    ];\n\n    const rawSteps = [\n      { tag: 'Tahap 1', title: 'Pencabutan Izin Usaha', date: '12 Mei 2026' },\n      { tag: 'Tahap 2', title: 'Rekonsiliasi & Verifikasi', date: '13 Mei – 7 Jun 2026' },\n      { tag: 'Tahap 3', title: 'Penetapan Simpanan Layak Bayar', date: '9 Jun 2026' },\n      { tag: 'Tahap 4', title: 'Pembayaran Tahap I', date: 'Mulai 16 Jun 2026' },\n      { tag: 'Tahap 5', title: 'Pembayaran Tahap II & Penyelesaian', date: 'Est. Jul – Sep 2026' }\n    ];\n    const steps = rawSteps.map((s, i) => {\n      const st = i < currentIdx ? 'done' : (i === currentIdx ? 'current' : 'pending');\n      const isLast = i === rawSteps.length - 1;\n      return {\n        ...s,\n        badge: st === 'done' ? '✓' : String(i + 1),\n        badgeBg: st === 'done' ? '#162A3C' : st === 'current' ? accent : '#fff',\n        badgeFg: st === 'pending' ? 'rgba(22,42,60,.45)' : '#fff',\n        badgeBorder: st === 'pending' ? '#E6E6E6' : (st === 'current' ? accent : '#162A3C'),\n        badgeAnim: st === 'current' ? 'animation:lpsPulse 2s infinite' : '',\n        lineColor: isLast ? 'transparent' : (i < currentIdx ? '#162A3C' : '#E6E6E6'),\n        tagColor: st === 'pending' ? 'rgba(22,42,60,.4)' : accent,\n        titleColor: st === 'pending' ? 'rgba(22,42,60,.5)' : '#162A3C'\n      };\n    });\n\n    const timelineRaw = [\n      { date: '16 Jun 2026', title: 'Pembayaran Tahap I dimulai', body: 'Pencairan simpanan layak bayar dibuka melalui Bank Nusantara Sejahtera untuk 7.310 nasabah.', kind: 'current' },\n      { date: '14 Jun 2026', title: 'Pengumuman jadwal & lokasi pembayaran', body: 'LPS merilis tata cara, jadwal, dan daftar kantor bank pembayar.', kind: 'done' },\n      { date: '9 Jun 2026', title: 'Penetapan simpanan layak bayar Tahap I', body: 'Sebanyak Rp 412,6 miliar dinyatakan layak dibayar setelah rekonsiliasi.', kind: 'done' },\n      { date: '22 Mei 2026', title: 'Pengumuman pertama kepada nasabah', body: 'LPS menginformasikan status penjaminan dan langkah penanganan.', kind: 'done' },\n      { date: '13 Mei 2026', title: 'Pembentukan Tim & mulai rekonsiliasi', body: 'LPS mengambil alih, membentuk Tim Likuidasi, dan memulai verifikasi data simpanan.', kind: 'done' },\n      { date: '12 Mei 2026', title: 'OJK mencabut izin usaha bank', body: 'Status bank ditetapkan sebagai Bank Dalam Likuidasi (BDL).', kind: 'done' }\n    ];\n    const timeline = timelineRaw.map((t) => ({\n      ...t,\n      lineColor: '#E6E6E6',\n      dotBg: t.kind === 'current' ? accent : '#162A3C',\n      dotBorder: t.kind === 'current' ? accent : '#162A3C'\n    }));\n\n    const newsAll = [\n      { type: 'Siaran Pers', cat: 'pers', date: '16 Jun 2026', tagColor: '#162A3C', title: 'LPS Beri Kepastian Pembayaran Klaim Simpanan kepada 7.310 Nasabah BPR Bank Catalonia', excerpt: 'Pembayaran tahap pertama mulai hari ini melalui bank pembayar yang ditunjuk.' },\n      { type: 'Pengumuman', cat: 'pengumuman', date: '14 Jun 2026', tagColor: accent, title: 'Pengumuman Pembayaran atas Penetapan Status Penjaminan Simpanan — Tahap I', excerpt: 'Jadwal, lokasi, dan tata cara pencairan simpanan bagi nasabah yang layak bayar.' },\n      { type: 'Pengumuman', cat: 'pengumuman', date: '10 Jun 2026', tagColor: accent, title: 'Daftar Nasabah dengan Simpanan Belum/Tidak Layak Bayar Tahap I', excerpt: 'Mekanisme pengajuan keberatan dan dokumen pendukung yang diperlukan.' },\n      { type: 'Berita', cat: 'berita', date: '11 Jun 2026', tagColor: '#5B6B78', title: 'Proses Likuidasi BPR Bank Catalonia Berjalan Sesuai Ketentuan', excerpt: 'LPS memastikan hak nasabah terlindungi selama proses penyelesaian.' }\n    ];\n    const filter = this.state.newsFilter;\n    const filteredNews = filter === 'all' ? newsAll : newsAll.filter((n) => n.cat === filter);\n    const fdefs = [\n      { key: 'all', label: 'Semua' },\n      { key: 'pengumuman', label: 'Pengumuman' },\n      { key: 'pers', label: 'Siaran Pers' },\n      { key: 'berita', label: 'Berita' }\n    ];\n    const newsFilters = fdefs.map((f) => {\n      const active = filter === f.key;\n      return {\n        label: f.label,\n        onClick: () => this.setNewsFilter(f.key),\n        bg: active ? accent : '#fff',\n        fg: active ? '#fff' : 'rgba(22,42,60,.7)',\n        border: active ? accent : '#E6E6E6'\n      };\n    });\n\n    const docs = [\n      { ext: 'PDF', title: 'SK Penetapan Simpanan Layak Bayar Tahap I', meta: 'Surat Keputusan · 1,2 MB' },\n      { ext: 'PDF', title: 'Panduan Pencairan Simpanan untuk Nasabah', meta: 'Panduan · 2,1 MB' },\n      { ext: 'PDF', title: 'Formulir Pengajuan Keberatan Nasabah', meta: 'Formulir · 480 KB' },\n      { ext: 'PDF', title: 'Daftar Bank Pembayar & Lokasi Kantor', meta: 'Lampiran · 320 KB' },\n      { ext: 'XLS', title: 'Tata Cara & Jadwal Verifikasi Simpanan', meta: 'Lampiran · 210 KB' }\n    ];\n\n    const branches = [\n      { name: 'Kantor Pusat — Bandung', status: 'Buka', address: 'Jl. Asia Afrika No. 112, Sumur Bandung, Kota Bandung 40111', hours: 'Sen–Jum, 08.00–15.00 WIB', phone: '(022) 4220-1540' },\n      { name: 'Kantor Cabang Cimahi', status: 'Buka', address: 'Jl. Raya Cibabat No. 45, Cimahi Utara', hours: 'Sen–Jum, 08.00–15.00 WIB', phone: '(022) 6630-1188' },\n      { name: 'Kantor Cabang Soreang', status: 'Buka', address: 'Jl. Raya Soreang No. 8, Kab. Bandung', hours: 'Sen–Jum, 08.00–14.00 WIB', phone: '(022) 5890-2277' }\n    ];\n\n    const faqRaw = [\n      { q: 'Apa itu “simpanan layak bayar”?', a: 'Simpanan layak bayar adalah simpanan yang memenuhi syarat penjaminan LPS (3T): Tercatat dalam pembukuan bank, Tingkat bunga tidak melebihi tingkat bunga penjaminan, dan nasabah Tidak melakukan tindakan yang merugikan bank. Hanya simpanan yang memenuhi syarat ini yang dibayarkan.' },\n      { q: 'Berapa nilai simpanan yang dijamin LPS?', a: 'LPS menjamin simpanan hingga Rp 2 miliar per nasabah per bank. Jika saldo Anda melebihi batas tersebut, kelebihannya menjadi hak tagih dalam proses likuidasi aset bank.' },\n      { q: 'Bagaimana cara mencairkan simpanan saya?', a: 'Setelah dinyatakan layak bayar, datangi kantor bank pembayar (Bank Nusantara Sejahtera) dengan membawa KTP asli serta buku tabungan/bilyet deposito. Anda juga dapat mengecek status terlebih dahulu melalui fitur “Cek Status Simpanan Saya” di halaman ini.' },\n      { q: 'Apa yang terjadi jika simpanan saya dinyatakan tidak layak bayar?', a: 'Anda berhak mengajukan keberatan melalui formulir resmi disertai bukti pendukung. Tim LPS akan meninjau ulang. Unduh formulir pada bagian “Dokumen & Unduhan”.' },\n      { q: 'Sampai kapan saya dapat mengajukan klaim?', a: 'Hak nasabah untuk mengajukan klaim pembayaran berlaku hingga 5 tahun sejak izin usaha bank dicabut. Disarankan untuk segera mencairkan sesuai jadwal yang diumumkan.' },\n      { q: 'Apakah saya dikenakan biaya?', a: 'Tidak. Seluruh proses pembayaran klaim penjaminan oleh LPS tidak dipungut biaya apa pun. Waspadai pihak yang menjanjikan percepatan dengan imbalan.' }\n    ];\n    const faqs = faqRaw.map((f, i) => ({\n      q: f.q, a: f.a,\n      open: this.state.faqOpen === i,\n      rot: this.state.faqOpen === i ? '45deg' : '0deg',\n      toggle: () => this.toggleFaq(i)\n    }));\n\n    const aiFeatures = [\n      { icon: '⚡', title: 'Cek status instan', body: 'Posisi pembayaran & kategori simpanan Anda.' },\n      { icon: '🏦', title: 'Lokasi bank pembayar', body: 'Alamat, jam buka, dan kontak terdekat.' },\n      { icon: '📄', title: 'Dokumen & syarat', body: 'Apa yang perlu dibawa saat pencairan.' },\n      { icon: '🤝', title: 'Eskalasi ke petugas', body: 'Disambungkan ke LPS bila diperlukan.' }\n    ];\n\n    const messages = this.state.messages.map((m) => ({\n      text: m.text,\n      align: m.role === 'user' ? 'flex-end' : 'flex-start',\n      bg: m.role === 'user' ? accent : '#fff',\n      fg: m.role === 'user' ? '#fff' : '#162A3C',\n      radius: m.role === 'user' ? '14px 14px 4px 14px' : '14px 14px 14px 4px'\n    }));\n\n    const quickReplies = [\n      { label: 'Kapan bisa cair?', onClick: () => this.quickSend('Kapan simpanan saya bisa dicairkan?') },\n      { label: 'Lokasi bank pembayar', onClick: () => this.quickSend('Di mana lokasi bank pembayar?') },\n      { label: 'Dokumen yang dibawa', onClick: () => this.quickSend('Dokumen apa yang harus saya bawa?') }\n    ];\n\n    return {\n      bank, accent, showChat,\n      currentStageLabel,\n      summary, stats, steps,\n      timeline, filteredNews, newsFilters,\n      docs, branches, faqs, aiFeatures,\n      checkVal: this.state.checkVal,\n      checkResult: this.state.checkResult,\n      noResult: !this.state.checkResult,\n      onCheckInput: this.onCheckInput, doCheck: this.doCheck,\n      chatOpen: this.state.chatOpen,\n      chatInput: this.state.chatInput,\n      messages, quickReplies,\n      toggleChat: this.toggleChat, openChat: this.openChat, closeChat: this.closeChat,\n      onChatInput: this.onChatInput, onChatKey: this.onChatKey, sendChat: this.sendChat,\n      chatFabIcon: this.state.chatOpen ? '✕' : '💬',\n      chatFabLabel: this.state.chatOpen ? 'Tutup' : 'Tanya Asisten LPS'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
